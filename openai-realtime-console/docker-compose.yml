version: '3.8'

services:
  realtime-console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openai-realtime-console
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Opcional: montar logs si quieres persistirlos
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - realtime-network

networks:
  realtime-network:
    driver: bridge
